# CI gates. Runs on every pull request and on pushes to feature branches.
# Everything runs ENTIRELY on mocks — no live Meta / Gemini / embeddings / Anthropic
# keys and no live network. Integration tests spin their own Postgres via
# Testcontainers (Docker is preinstalled on ubuntu-latest); no service container needed.
name: ci

on:
  pull_request:
  push:
    branches:
      - 'feature/**'
      - 'feat/**'

jobs:
  # STABLE job name — select "build-test" as the required status check in the
  # branch ruleset. Do not rename or matrix-ize this job (it would change the
  # check context and silently drop the gate).
  build-test:
    name: build-test
    runs-on: ubuntu-latest
    env:
      # Force the mock/dev path so no step can reach a live dependency.
      Meta__Mode: mock
      Vault__Enabled: "false"
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore
      - name: Format check
        run: dotnet format --verify-no-changes
      - name: Build (Roslyn analyzers + warnings-as-errors)
        run: dotnet build --no-restore -c Release
      - name: Test (mocks + Testcontainers Postgres)
        run: dotnet test --no-build -c Release
      - name: Vulnerability scan
        run: dotnet list package --vulnerable --include-transitive

  # STABLE job name — select "eval-gate" as a required status check alongside "build-test".
  # The merge-blocking eval tier (DL-046/051): the §1 deterministic invariants + the §6
  # committed-verdicts judge replay (κ recompute + the 13-16 adversarial asserts). Strictly
  # no-spend and key-free: no Gemini, no Anthropic, no TEI/bge self-hosted models — only the
  # deterministic mock path. §2 (retrieval rank/ablation, needs TEI/bge) and §3 (cost/latency,
  # tracked) and the live judge calibration are deliberately EXCLUDED — they are tracked, not
  # blocking, and run in the nightly / on-demand instead.
  eval-gate:
    name: eval-gate
    runs-on: ubuntu-latest
    env:
      Meta__Mode: mock
      Vault__Enabled: "false"
      # Blank every LLM key so this tier cannot reach a live provider even if one is set.
      ANTHROPIC_API_KEY: ""
      GEMINI_API_KEY: ""
      Gemini__ApiKey: ""
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore
      - name: Format check
        run: dotnet format --verify-no-changes
      - name: Build (Roslyn analyzers + warnings-as-errors)
        run: dotnet build --no-restore -c Release
      - name: EvalGate (§1 invariants + §6 judge replay — deterministic, no-spend, no TEI/Gemini)
        run: dotnet test --no-build -c Release --filter "Category=EvalGate"

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
