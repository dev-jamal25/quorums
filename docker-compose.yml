# Nine-service topology (DL-015, DL-016, DL-024). Demo target: `docker compose up`.
# Service set is FROZEN — do not add, remove, merge, or rename services.
# Redis is IDistributedCache ONLY (not the queue broker); the queue/job store is
# Hangfire on Postgres. Config values are supplied via .env (see .env.example);
# no real secrets are committed.

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # ASP.NET Core Web API. HTTP surface: brands, knowledge CMS, runs, approvals, assets.
    environment:
      Vault__Enabled: "false"
    env_file: [.env]
    restart: unless-stopped
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault:
        condition: service_started
      tei-embed:
        condition: service_healthy
      tei-rerank:
        condition: service_healthy
      # The Worker is the sole Hangfire-schema installer; wait until its schema-readiness
      # healthcheck passes so the api never touches the store before the schema exists.
      worker:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # .NET Worker Service hosting the Hangfire server. Same publish output as api
    # (zero version skew); overrides the entrypoint to run the worker assembly.
    environment:
      Vault__Enabled: "false"
    command: ["Backend.Worker.dll"]
    env_file: [.env]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault:
        condition: service_started
      tei-embed:
        condition: service_healthy
      tei-rerank:
        condition: service_healthy
    # Reflects Hangfire schema readiness: the worker drops /tmp/hangfire-ready once its host has
    # started (PostgreSqlObjectsInstaller has created the hangfire schema + tables). The api's
    # depends_on gates on this, so schema install happens in exactly one place, before the api uses it.
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/hangfire-ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Next.js dashboard: onboarding, analytics, approvals, run/trace viewer.
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8080"
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: pgvector/pgvector:pg16
    # Relational data + RLS isolation + pgvector embeddings + Hangfire job store
    # (separate schema) + run checkpoints.
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    # IDistributedCache (caching) ONLY. NOT the queue broker.
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    # Object storage for generated media, brand-prefixed: brands/{brand_id}/assets/{asset_id}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault
    # Dev mode for the demo. KV: app secrets. Transit: per-brand token encryption
    # (transit/keys/brand-tokens). Hardening path documented; dev mode stated openly.
    # SKIP_SETCAP suppresses the CAP_SETFCAP error on Docker Desktop / WSL2 (HashiCorp
    # documented escape hatch). IPC_LOCK keeps mlock available when the kernel allows it.
    cap_add: [IPC_LOCK]
    command: server -dev
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      SKIP_SETCAP: "true"
    ports:
      - "8200:8200"

  tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    # Embedding server for nomic-embed-text-v1.5 (768-dim, cosine, normalized).
    # DL-024: replaces Ollama. Listens on port 80; weights downloaded on first start.
    # Named volume persists the model cache so weights are not re-downloaded each run.
    # Generous start_period covers first-run weight download.
    # --revision is PINNED: upstream `main` config.json churns (a "standardize for
    # Transformers" change adds a duplicate `max_position_embeddings`) and TEI 1.6's
    # strict parser rejects duplicate keys → "Failed to parse config.json" → exit(1).
    # bf8779d… is the verified-clean NomicBert config. Do NOT drop the pin.
    command: ["--model-id", "nomic-ai/nomic-embed-text-v1.5", "--revision", "bf8779d6d6e2b2b40132bc9266cc056a342aa4ed"]
    ports:
      - "8090:80"
    volumes:
      - tei-embed-cache:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  tei-rerank:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    # Cross-encoder reranker for BAAI/bge-reranker-v2-m3 (DL-025). Exposes /rerank.
    # Named volume persists the model cache so weights are not re-downloaded each run.
    command: ["--model-id", "BAAI/bge-reranker-v2-m3"]
    ports:
      - "8091:80"
    volumes:
      - tei-rerank-cache:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

volumes:
  pgdata:
  miniodata:
  tei-embed-cache:
  tei-rerank-cache:
